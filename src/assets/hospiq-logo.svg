<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <!-- ══ ICON MARK ══ -->

  <!-- Background tile -->
  <rect x="0" y="0" width="48" height="48" rx="12" fill="url(#iconGrad)" opacity="0.14"/>
  <rect x="0.75" y="0.75" width="46.5" height="46.5" rx="11.4" fill="none" stroke="url(#iconGrad)" stroke-width="1.1" opacity="0.7"/>

  <!-- H — left stem -->
  <rect x="9.5" y="12" width="5.5" height="24" rx="2.75" fill="url(#iconGrad)"/>
  <!-- H — right stem -->
  <rect x="22.5" y="12" width="5.5" height="24" rx="2.75" fill="url(#iconGrad)"/>
  <!-- H — crossbar -->
  <rect x="9.5" y="21" width="18.5" height="6" rx="3" fill="url(#iconGrad)"/>

  <!-- Q — circle -->
  <circle cx="37.5" cy="24" r="7.5" fill="none" stroke="url(#iconGrad)" stroke-width="3.2"/>
  <!-- Q — tail -->
  <line x1="42.8" y1="29.2" x2="47" y2="34" stroke="url(#iconGrad)" stroke-width="3.2" stroke-linecap="round"/>

  <!-- ══ WORDMARK ══ -->
  <!-- Using embedded font-weight 700 Inter via SVG text with dominant-baseline -->
  <text
    x="62"
    y="31"
    font-family="Inter, 'SF Pro Display', -apple-system, 'Segoe UI', sans-serif"
    font-size="20"
    font-weight="700"
    letter-spacing="2"
    fill="url(#wordGrad)"
    dominant-baseline="auto"
  >HOSPIQ</text>
</svg>
