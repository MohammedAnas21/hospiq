<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: rounded square background -->
  <rect x="0" y="0" width="40" height="40" rx="10" fill="url(#g1)" opacity="0.15"/>
  <rect x="0" y="0" width="40" height="40" rx="10" fill="none" stroke="url(#g1)" stroke-width="1.2" opacity="0.6"/>

  <!-- H letterform -->
  <rect x="7" y="10" width="4" height="20" rx="1.8" fill="url(#g1)"/>
  <rect x="18.5" y="10" width="4" height="20" rx="1.8" fill="url(#g1)"/>
  <rect x="7" y="17.8" width="15.5" height="4" rx="1.8" fill="url(#g1)"/>

  <!-- Q letterform: circle + tail -->
  <circle cx="32" cy="20" r="6.5" fill="none" stroke="url(#g1)" stroke-width="3.2"/>
  <!-- Q tail -->
  <line x1="36" y1="24.5" x2="39.5" y2="29" stroke="url(#g1)" stroke-width="3" stroke-linecap="round"/>

  <!-- Wordmark: HOSPIQ -->
  <text x="50" y="26.5" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="17" font-weight="600" letter-spacing="0.5" fill="url(#g1)">HOSPIQ</text>
</svg>
